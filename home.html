<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind / Daisy -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css" />
    <title>Issue Tracker/Home</title>
  </head>
  <body>
    <main class="max-w-7xl mx-auto py-10 px-6">
      <!-- All issue and search bar -->
      <section
        class="bg-base-100 rounded-xl shadow mt-10 p-5 flex flex-col md:flex-row justify-between items-center gap-5 mb-5"
      >
        <h2 class="text-xl font-bold">ALL ISSUES</h2>

        <div class="flex gap-3">
          <input
            id="search-input"
            type="text"
            placeholder="Search Issues..."
            class="input input-bordered w-72"
          />

          <button id="new-issue-btn" class="btn btn-primary">SEARCH</button>
        </div>
      </section>

          <!-- Buttons -->

       <section class="bg-base-100 rounded-xl shadow p-5">
         <div class="join">
          <button id="all-btn" class="btn active join-item">All</button>

          <button id="open-btn" class="btn join-item">Open</button>

          <button id="closed-btn" class="btn join-item">Closed</button>
        </div>
        </section>

        <!-- Count Header -->

        <section class="bg-base-100 rounded-xl shadow mt-6 p-6">
           <div class="flex flex-col md:flex-row justify-between items-center">
          <div class="flex gap -5 items-center">
            <img src="./assets/Aperture.png" class="h-[40px]" alt="" />
            <div>
              <h2 class="text-2xl font-bold">
                <span id="total-issue">0</span> Issues
              </h2>

              <p class="text-gray-500">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex gap-6 mt-5 md:mt-0">
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-green-500"></div>

              <span> Open </span>
            </div>

            <div class="flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-purple-500"></div>

              <span> Closed </span>
            </div>
          </div>
        </div>

        </section>

        <!-- Card container -->

        <section id="issue-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mt-8">
        
        <div id="spinner" class="col-span-full flex justify-center  items-center py-10 hidden">
        <span class="loading loading-spinner loading-lg       text-primary"></span>
        </div>
          <!-- Card -->
           <!-- <div class="status-border bg-base-100 shadow rounded-xl p-4">
          <div class="flex justify-between items-center">
            <div><img src="./assets/Open-Status.png" alt=""> <img src="./assets/Closed- Status .png" alt=""></div>

            <div class="badge badge-error">HIGH</div>
          </div>

            Fix Navigation Menu On Mobile Devices

          <p class="text-sm text-gray-500 mt-3">

            <div class="badge badge-outline badge-error">BUG</div>

       </section>

       <!-- Modal -->

       <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
      <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <!-- <h3 class="text-lg font-bold">Hello!</h3>
    <p class="py-4">Press ESC key or click the button below to close</p> -->
          <div id="details-container" class="space-y-5">
           
          </div>

          <div class="modal-action">
            <form method="dialog">
              
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>
    <script src="./scripts/home.js"></script>
  </body>
</html>
